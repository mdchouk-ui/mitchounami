<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mitchou Nami &amp; les Sauve-Terre</title>
  <meta
    name="description"
    content="Mitchou Nami et les Sauve-Terre. Suivre Mitchou sur Instagram."
  >
  <link rel="icon" type="image/png" href="/assets/favicon-seiche.png">
  <link rel="apple-touch-icon" href="/assets/favicon-seiche.png">
  <link rel="preload" as="image" href="/assets/seiche-coeur-terre.png">
  <link rel="preload" as="image" href="/assets/mitchou-comingsoon.jpg">
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/site.css">
</head>
<body>
  <nav class="st-nav st-nav-simple">
    <a href="/" class="st-nav-brand">
      <img src="/assets/seiche-coeur-terre.png" alt="La seiche Sauve-Terre" class="st-nav-mascot" width="52" height="52">
      <span class="st-nav-wordmark">
        <span class="st-nav-l1">Mitchou Nami</span>
        <span class="st-nav-l2">&amp; les Sauve-Terre</span>
      </span>
    </a>
  </nav>

  <main class="st-temp-main">
    <section class="st-temp-home">
      <div class="st-temp-head">
        <img
          src="/assets/seiche-coeur-terre.png"
          alt="Logo Mitchou Nami et les Sauve-Terre"
          class="st-temp-logo"
          width="132"
          height="132"
        >
        <div class="st-temp-wordmark">
          <p class="st-eyebrow">Mitchou Nami</p>
          <h1 class="st-temp-title">&amp; les Sauve-Terre</h1>
        </div>
      </div>

      <figure class="st-temp-figure">
        <img
          src="/assets/mitchou-comingsoon.jpg"
          alt="Mitchou enlace la Terre au coucher du soleil"
          class="st-temp-image"
          width="1254"
          height="1254"
        >
      </figure>

      <section class="st-social st-temp-social" id="suivre">
        <div class="st-social-inner">
          <div class="st-social-grid st-social-grid-single">
            <a
              href="https://www.instagram.com/mitchounami"
              class="st-social-card st-social-card-rouge st-social-card-r2"
              target="_blank"
              rel="noreferrer"
            >
              <div class="st-social-label">Instagram</div>
              <div class="st-social-handle">@mitchounami</div>
              <div class="st-social-note">suivre Mitchou sur la route</div>
              <div class="st-social-arrow">→</div>
            </a>
          </div>
        </div>
      </section>
    </section>
  </main>
</body>
</html>
